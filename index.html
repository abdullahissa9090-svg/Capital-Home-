<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
كابيتال هوم | عقارات المنيا
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo;
}

body{
background:#0c0c0e;
color:white;
}

.container{
width:min(95%,1200px);
margin:auto;
}

header{
padding:50px 20px;
text-align:center;
}

.logo{
width:140px;
height:140px;
object-fit:contain;
}

.sub{
color:#aaa;
margin-top:10px;
}

.heroBtns{
display:flex;
gap:10px;
justify-content:center;
margin-top:25px;
flex-wrap:wrap;
}

.btn{
padding:14px 20px;
border-radius:14px;
text-decoration:none;
font-weight:800;
}

.gold{
background:#d4af37;
color:black;
}

.dark{
background:#16161a;
color:white;
}

.search{

margin-top:30px;

}

.search input{

width:100%;

padding:18px;

border-radius:18px;

background:#141417;

border:1px solid #222;

color:white;

}

.tabs{

display:flex;

gap:10px;

margin:25px 0;

}

.tab{

flex:1;

padding:15px;

border:none;

border-radius:14px;

background:#16161a;

color:white;

}

.active{

background:#d4af37;

color:black;

}

.grid{

display:grid;

gap:18px;

}

.card{

background:#141417;

padding:20px;

border-radius:20px;

cursor:pointer;

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.price{

color:#38bdf8;

font-size:28px;

font-weight:800;

margin:10px 0;

}

.tags{

display:flex;

gap:10px;

flex-wrap:wrap;

}

.tag{

padding:8px 12px;

background:#1f1f24;

border-radius:10px;

}

.details{

display:none;

margin-top:20px;

color:#bbb;

}

.card.open .details{

display:block;

}

.wa{

display:block;

margin-top:20px;

padding:14px;

background:#22c55e;

text-align:center;

color:white;

text-decoration:none;

border-radius:14px;

}

footer{

padding:50px;

text-align:center;

color:#777;

}

.float{

position:fixed;

left:20px;

bottom:20px;

width:60px;

height:60px;

border-radius:50%;

background:#22c55e;

display:flex;

justify-content:center;

align-items:center;

text-decoration:none;

font-size:30px;

}

</style>

</head>

<body>

<div class="container">

<header>

<img
src="brand-og-image.jpg"
class="logo">

<h1>

CAPITAL HOME

</h1>

<p class="sub">

عقارات المنيا والمنيا الجديدة

</p>

<div class="heroBtns">

<a
class="btn gold"
href="#list">

العروض

</a>

<a
class="btn dark"
href="tel:01555086599">

اتصال

</a>

</div>

</header>

<div class="search">

<input
id="search"

placeholder="ابحث عن عقار">

</div>

<div class="tabs">

<button
class="tab active">

شقق

</button>

<button
class="tab">

فيلل

</button>

<button
class="tab">

محلات

</button>

</div>

<div
id="list"
class="grid">

</div>
<footer>

<div
style="
font-size:28px;
font-weight:800;
">

CAPITAL HOME

</div>

<br>

<div>

01555086599

</div>

</footer>

</div>

<a

class="float"

href="https://wa.me/201555086599"

>

💬

</a>

<script>

const data=[

{

title:

"شقة دريم ڤالي",

price:

"2.4 مليون",

tags:

["115م","3 غرف"],

details:

"دور أول علوي • جاردن 30م • قريبة من جامعة دراية"

},

{

title:

"شقة ميدان الساعة",

price:

"3.65 مليون",

tags:

["111م","سوبر لوكس"],

details:

"برج حديث • 2 أسانسير • غاز طبيعي"

},

{

title:

"فيلا مراكش",

price:

"10.5 مليون",

tags:

["161م","حمام سباحة"],

details:

"تشطيب فاخر • موقع مميز"

},

{

title:

"محل شلبي",

price:

"850 ألف",

tags:

["28م"],

details:

"عداد تجاري • تشطيب لوكس"

}

]

const list=

document

.getElementById(

"list"

)

function render(

arr=data

){

list.innerHTML=""

arr.forEach(

p=>{

list.innerHTML+=`

<div
class="card">

<h2>

${p.title}

</h2>

<div
class="price">

${p.price}

</div>

<div
class="tags">

${p.tags

.map(

x=>

`<span
class="tag">

${x}

</span>`

)

.join("")}

</div>

<div
class="details">

${p.details}

<a

class="wa"

href=

"https://wa.me/201555086599"

>

استفسار

</a>

</div>

</div>

`

}

)

document

.querySelectorAll(

".card"

)

.forEach(

x=>

x.onclick=

()=>

x.classList.toggle(

"open"

)

)

}

render()

document

.getElementById(

"search"

)

.oninput=

e=>{

const v=

e.target.value

.toLowerCase()

render(

data.filter(

x=>

x.title

.toLowerCase()

.includes(v)

||

x.details

.toLowerCase()

.includes(v)

)

)

}

</script>

</body>

</html>
