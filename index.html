let currentCategory = "شقة";  
let isEventsBound = false;  
let renderTimeout;  
  
function normalizeArabic(str) {  
    return String(str)  
        .toLowerCase()  
        .replace(/[أإآ]/g, 'ا')  
        .replace(/ة/g, 'ه')  
        .replace(/ى/g, 'ي')  
        .replace(/[ً-ٟ]/g, '')  
        .replace(/[^\u0600-\u06FF0-9a-z\s]/gi, '')  
        .replace(/\s+/g, ' ')  
        .trim();  
}  
  
function renderProperties() {  
    document.querySelectorAll('.details-box').forEach(box => box.style.display = 'none');  
  
    const wrapper = document.getElementById('propertiesWrapper');   
    wrapper.innerHTML = '';  
    const keyword = normalizeArabic(document.getElementById('propertySearch').value);  
    const locationVal = document.getElementById('filterLocation').value;  
    const finishingVal = document.getElementById('filterFinishing').value;  
    const priceVal = document.getElementById('filterPrice').value;  
  
    const filtered = propertiesData.filter(item => {  
        if (item.category !== currentCategory) return false;  
        if (locationVal !== 'all' && item.locationCategory !== locationVal) return false;  
        if (finishingVal !== 'all' && item.finishing !== finishingVal) return false;  
          
        // 2- استبدال الحسبة الثابتة بـ item.price مباشرة لمرونة تعديل البيانات لاحقاً دون اختلال الفلترة  
        let effectivePrice = item.price;  
        if (priceVal !== 'all' && effectivePrice > parseInt(priceVal)) return false;  
          
        if (keyword) {  
            const matchTitle = normalizeArabic(item.title).includes(keyword);  
            const matchPriceText = normalizeArabic(item.priceText).includes(keyword);  
            const matchLocation = normalizeArabic(item.locationCategory).includes(keyword);  
            const matchBullets = item.bullets.some(b => normalizeArabic(b).includes(keyword));  
            const matchMeta = item.meta.some(m => normalizeArabic(m).includes(keyword));  
              
            if (!matchTitle && !matchPriceText && !matchLocation && !matchBullets && !matchMeta) return false;  
        }  
        return true;  
    });  
  
    const noResults = document.getElementById('noResults');  
    if (filtered.length === 0) {   
        noResults.classList.remove('hidden');  
        return;   
    }  
    noResults.classList.add('hidden');  
  
    filtered.forEach(prop => {  
        const cardEl = document.createElement('div');   
        cardEl.className = 'card bg-bgCard p-6 rounded-2xl cursor-pointer transition-all duration-300 border border-white/5 hover:bg-bgCardHover hover:-translate-y-1 hover:border-goldCustom hover:shadow-[0_10px_30px_rgba(212,175,55,0.15)]';   
        cardEl.setAttribute('data-id', prop.id);   
          
        let metaBadges = prop.meta.map(m => {  
            const isInstallment = m.includes('تقسيط');  
            const styleClasses = isInstallment   
                ? 'bg-goldCustom text-black'   
                : 'bg-white/5 text-zinc-400';  
            return '<span class="' + styleClasses + ' py-1 px-3 rounded-lg text-xs font-bold">' + m + '</span>';  
        }).join('');  
  
        cardEl.innerHTML = '<h3 class="text-xl font-bold text-white">' + prop.title + '</h3><div class="text-2xl font-extrabold text-priceBlue my-1.5">' + prop.priceText + '</div><div class="flex flex-wrap gap-2 mt-3">' + metaBadges + '</div>';  
          
        const detailEl = document.createElement('div');   
        detailEl.className = 'details-box bg-[#111113] p-6 rounded-2xl border border-goldCustom mt-[-10px] mb-4 shadow-[0_0_25px_rgba(212,175,55,0.1)]';   
        detailEl.id = 'box-' + prop.id;   
        detailEl.style.display = 'none';  
          
        let bulletItems = prop.bullets.map(b => '<div class="text-sm text-zinc-300 font-medium flex items-center gap-2 before:content-[\'•\'] before:text-goldCustom before:text-2xl before:font-bold">' + b + '</div>').join('');  
        let galleryHTML = '<div class="bg-white/[0.02] border border-dashed border-goldCustom/20 p-5 rounded-xl text-center text-goldCustom text-sm font-semibold mb-5 flex items-center justify-center gap-2">🛡️ المعاينة الميدانية تتم بالتنسيق المسبق مع المالك عبر المكتب لحفظ السرية والجدية</div>';  
  
        let paymentPlanHTML = '';  
        if (prop.paymentPlan) {  
            paymentPlanHTML = '<div class="mb-5 bg-gradient-to-r from-goldCustom/10 to-transparent border border-goldCustom/20 p-4 rounded-xl">' +  
                '<h4 class="text-sm font-bold text-goldCustom mb-3 flex items-center gap-1.5">💳 خطة السداد</h4>' +  
                '<div class="grid grid-cols-1 sm:grid-cols-4 gap-3 text-xs">' +  
                    '<div class="bg-black/40 p-2.5 rounded-lg border border-white/5"><span class="text-zinc-400 block mb-0.5">💰 الأوفر:</span><strong class="text-white text-sm">' + prop.paymentPlan.offer + '</strong></div>' +  
                    '<div class="bg-black/40 p-2.5 rounded-lg border border-white/5"><span class="text-zinc-400 block mb-0.5">💳 المدفوع:</span><strong class="text-white text-sm">' + prop.paymentPlan.paid + '</strong></div>' +  
                    '<div class="bg-black/40 p-2.5 rounded-lg border border-white/5"><span class="text-zinc-400 block mb-0.5">📅 المتبقي:</span><strong class="text-white text-sm">' + prop.paymentPlan.remaining + '</strong></div>' +  
                    '<div class="bg-black/40 p-2.5 rounded-lg border border-white/5"><span class="text-zinc-400 block mb-0.5">💵 القسط:</span><strong class="text-priceBlue text-sm">' + prop.paymentPlan.value + '</strong></div>' +  
                '</div>' +  
            '</div>';  
        }  
  
        const contactBtnText = prop.customContactText ? prop.customContactText : "حجز معاينة مجانية الآن";  
  
        detailEl.innerHTML = galleryHTML + paymentPlanHTML +  
            '<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 bg-white/[0.01] p-4 rounded-xl border border-white/5">' + bulletItems + '</div>' +  
            '<div class="flex gap-2 mt-6 flex-wrap">' +  
                '<a class="flex-1 min-w-[140px] py-3.5 px-4 bg-whatsappGreen text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all hover:brightness-110" href="https://wa.me/201555086599?text=مرحباً أستاذ عبد الله، أريد الاستفسار بخصوص: ' + prop.title + '" target="_blank" rel="noopener noreferrer">💬 ' + contactBtnText + '</a>' +  
                '<a class="flex-1 min-w-[140px] py-3.5 px-4 bg-goldCustom text-bgMain rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all hover:brightness-110" href="https://wa.me/201555086599?text=مرحباً أستاذ عبد الله، أريد الحصول على فيديو المعاينة الواقعية لـ: ' + prop.title + '" target="_blank" rel="noopener noreferrer">🎬 اطلب فيديو المعاينة</a>' +  
                '<a class="w-24 py-3.5 px-4 bg-phoneBlue text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all hover:brightness-110" href="tel:01555086599">📞 اتصال</a>' +  
                '<button class="w-12 py-3.5 px-4 bg-white/5 border border-white/5 text-white rounded-xl font-bold text-sm flex items-center justify-center transition-all hover:bg-white/10 btn-sh" data-title="' + prop.title + '" data-id="' + prop.id + '">🔗</button>' +  
            '</div>';  
              
        wrapper.appendChild(cardEl);   
        wrapper.appendChild(detailEl);  
    });  
    bindEvents();  
}  
  
function renderSkeletons() {  
    const wrapper = document.getElementById('propertiesWrapper');   
    wrapper.innerHTML = '';  
    document.getElementById('noResults').classList.add('hidden');  
    for(let i=0; i<3; i++) {  
        const skEl = document.createElement('div');   
        skEl.className = 'skeleton-card bg-bgCard p-6 rounded-2xl border border-white/5 flex flex-col gap-3 relative overflow-hidden';  
        skEl.innerHTML = '<div class="skeleton-line title bg-zinc-800 h-6 w-3/5 rounded"></div><div class="skeleton-line price bg-zinc-800 h-5 w-1/3 rounded"></div><div class="skeleton-line badge bg-zinc-800 h-4 w-2/5 rounded"></div>';  
        wrapper.appendChild(skEl);  
    }  
}  
  
function triggerDynamicRender() {  
    clearTimeout(renderTimeout);  
    renderSkeletons();  
    // 3- تقليص الـ timeout إلى 150ms لتسريع الفلترة والتحميل الفوري  
    renderTimeout = setTimeout(renderProperties, 150);  
}  
  
function bindEvents() {  
    if (isEventsBound) return;  
      
    const wrapper = document.getElementById('propertiesWrapper');  
      
    wrapper.addEventListener('click', function(e) {  
        const shareBtn = e.target.closest('.btn-sh');  
        if (shareBtn && wrapper.contains(shareBtn)) {  
            e.stopPropagation();   
            const title = shareBtn.getAttribute('data-title');   
            const id = shareBtn.getAttribute('data-id');  
            const targetUrl = window.location.href.split('?')[0] + '?property=' + id;  
            const text = 'معاينة وتفاصيل: [ ' + title + ' ] بمحافظة المنيا. تفضل بزيارة الرابط المباشر للعقار: ' + targetUrl;  
            if (navigator.share) {   
                navigator.share({ title: 'كابيتال هوم', text: text, url: targetUrl }).catch(err => console.error(err));   
            } else if (navigator.clipboard) {   
                navigator.clipboard.writeText(text).then(() => { alert('تم نسخ رابط وتفاصيل العقار بنجاح!'); });   
            }  
            return;   
        }  
  
        const card = e.target.closest('.card');  
        if (card && wrapper.contains(card)) {  
            const id = card.getAttribute('data-id');   
            const targetBox = document.getElementById('box-' + id);  
            const isActive = targetBox.style.display === 'block';  
              
            document.querySelectorAll('.details-box').forEach(box => box.style.display = 'none');  
            if (!isActive) {   
                targetBox.style.display = 'block';   
                setTimeout(() => { targetBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);   
            }  
            return;  
        }  
    });  
  
    isEventsBound = true;  
}  
  
document.getElementById('leadForm').addEventListener('submit', function(e) {  
    e.preventDefault();  
    const waText = 'مرحباً أستاذ عبد الله، تم تسجيل طلب عقار جديد عبر موقع كابيتال هوم:%0A👤 الاسم: ' + document.getElementById('clientName').value + '%0A📞 الهاتف: ' + document.getElementById('clientPhone').value + '%0A🎯 الطلب المطلوب وميزانيتي: ' + document.getElementById('clientRequest').value;  
    window.open('https://wa.me/201555086599?text=' + waText, '_blank', 'noopener,noreferrer');  
});  
  
document.getElementById('propertySearch').addEventListener('input', triggerDynamicRender);  
document.getElementById('filterLocation').addEventListener('change', triggerDynamicRender);  
document.getElementById('filterFinishing').addEventListener('change', triggerDynamicRender);  
document.getElementById('filterPrice').addEventListener('change', triggerDynamicRender);  
  
function switchCategoryUI(categoryName) {  
    document.querySelectorAll('.nav-btn').forEach(b => {  
        b.classList.remove('active-btn', 'bg-goldCustom', 'text-bgMain');  
        b.classList.add('bg-bgCard', 'text-zinc-400');  
    });  
      
    const targetBtn = document.getElementById('btnCat-' + categoryName);  
    if (targetBtn) {  
        targetBtn.classList.add('active-btn', 'bg-goldCustom', 'text-bgMain');  
        targetBtn.classList.remove('bg-bgCard', 'text-zinc-400');  
    }  
      
    currentCategory = categoryName;  
    document.getElementById('sell-property-sec').classList.add('hidden');   
    document.getElementById('propertiesWrapper').classList.remove('hidden');  
}  
  
document.querySelectorAll('.nav-btn').forEach(button => {  
    button.addEventListener('click', function() {  
        const target = this.getAttribute('data-target');   
        const cat = this.getAttribute('data-cat');  
          
        if (target === 'properties-wrapper') {  
            switchCategoryUI(cat);  
            triggerDynamicRender();  
        } else {  
            document.querySelectorAll('.nav-btn').forEach(b => {  
                b.classList.remove('active-btn', 'bg-goldCustom', 'text-bgMain');  
                b.classList.add('bg-bgCard', 'text-zinc-400');  
            });   
            this.classList.add('active-btn', 'bg-goldCustom', 'text-bgMain');  
            this.classList.remove('bg-bgCard', 'text-zinc-400');  
              
            document.getElementById('propertiesWrapper').classList.add('hidden');   
            document.getElementById('noResults').classList.add('hidden');  
            document.getElementById('sell-property-sec').classList.remove('hidden');   
            document.getElementById('sell-property-sec').scrollIntoView({ behavior: 'smooth' });  
        }  
    });  
});  
  
function checkUrlParameters() {  
    const urlParams = new URLSearchParams(window.location.search);  
    const propertyId = urlParams.get('property');  
    if (propertyId) {  
        const targetProperty = propertiesData.find(item => item.id === propertyId);  
        if (targetProperty) {  
            switchCategoryUI(targetProperty.category);  
            triggerDynamicRender();  
              
            setTimeout(() => {  
                const targetBox = document.getElementById('box-' + propertyId);  
                if (targetBox) {  
                    targetBox.style.display = 'block';  
                    targetBox.scrollIntoView({ behavior: 'smooth', block: 'center' });  
                }  
            }, 450);  
        }  
    }  
}  
  
document.addEventListener("DOMContentLoaded", () => {   
    triggerDynamicRender();   
    checkUrlParameters();  
});
