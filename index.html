<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

Capital Home | عقارات المنيا

</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo;
}

:root{

--bg:#0c0c0e;

--card:#141417;

--gold:#d4af37;

--text:#ffffff;

--muted:#a1a1aa;

--blue:#38bdf8;

}

body{

background:

linear-gradient(
180deg,
#08080a,
#111
);

color:white;

}

.container{

width:min(94%,1200px);

margin:auto;

}

header{

padding:60px 0;

text-align:center;

}

.logo{

width:120px;

height:120px;

border-radius:30px;

background:

linear-gradient(
135deg,
#1a1a1f,
#25252b
);

display:flex;

align-items:center;

justify-content:center;

margin:auto;

font-size:28px;

font-weight:800;

color:var(--gold);

}

.hero{

margin-top:25px;

font-size:34px;

font-weight:800;

}

.sub{

color:var(--muted);

margin-top:12px;

line-height:1.8;

}

.actions{

display:flex;

justify-content:center;

gap:14px;

margin-top:25px;

flex-wrap:wrap;

}

.btn{

padding:14px 22px;

border-radius:16px;

font-weight:800;

text-decoration:none;

}

.gold{

background:var(--gold);

color:black;

}

.dark{

background:var(--card);

color:white;

border:1px solid #26262d;

}

.search{

margin:35px 0;

}

.search input{

width:100%;

padding:18px;

border-radius:18px;

border:1px solid #26262d;

background:#151519;

color:white;

}

.tabs{

display:flex;

gap:10px;

margin-bottom:25px;

}

.tab{

flex:1;

padding:16px;

background:var(--card);

border:none;

color:#999;

border-radius:18px;

font-weight:800;

}

.tab.active{

background:var(--gold);

color:black;

}

.grid{

display:grid;

grid-template-columns:

repeat(
auto-fit,
minmax(
320px,
1fr
)

);

gap:18px;

}

.card{

background:

rgba(
20,
20,
23,
.9
);

border:

1px solid

#222;

padding:22px;

border-radius:26px;

transition:.3s;

}

.card:hover{

transform:

translateY(-6px);

border-color:

var(--gold);

}

.title{

font-size:22px;

font-weight:800;

}

.price{

margin-top:10px;

font-size:30px;

color:var(--blue);

font-weight:800;

}

.tags{

display:flex;

gap:8px;

flex-wrap:wrap;

margin-top:15px;

}

.tag{

padding:8px 12px;

background:#1d1d22;

border-radius:12px;

font-size:13px;

}

.details{

margin-top:18px;

color:#bbb;

line-height:1.8;

}

.wa{

display:block;

margin-top:20px;

padding:14px;

border-radius:16px;

text-align:center;

text-decoration:none;

background:#22c55e;

color:white;

font-weight:800;

}

footer{

padding:70px 0;

text-align:center;

color:#888;

}

.float{

position:fixed;

bottom:20px;

left:20px;

width:60px;

height:60px;

border-radius:50%;

background:#22c55e;

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">

CH

</div>

<div class="hero">

CAPITAL HOME

</div>

<div class="sub">

تسويق وإشراف عقاري
في المنيا والمنيا الجديدة

</div>

<div class="actions">

<a
class="btn gold"
href="#list">

العروض

</a>

<a
class="btn dark"
href="tel:01555086599">

اتصل بنا

</a>

</div>

</header>

<div class="search">

<input
id="search"

placeholder="ابحث عن عقار">

</div>

<div class="tabs">

<button
class="tab active">

شقق

</button>

<button
class="tab">

فيلل

</button>

<button
class="tab">

محلات

</button>

</div>

<div
id="list"
class="grid">

</div>
<footer>

<div
style="
font-size:26px;
font-weight:800;
">

CAPITAL HOME

</div>

<br>

<div>

01555086599

</div>

</footer>

</div>

<a

class="float"

href="https://wa.me/201555086599"

>

💬

</a>

<script>

const properties=[

{

cat:"شقق",

title:

"شقة دريم ڤالي",

price:

"2.4 مليون",

tags:

[

"115م",

"3 غرف",

"جاردن"

],

details:

"دور أول علوي • 30م جاردن • قريب جامعة دراية"

},

{

cat:"شقق",

title:

"شقة ميدان الساعة",

price:

"3.65 مليون",

tags:

[

"111م",

"سوبر لوكس"

],

details:

"واجهة بحرية • غاز طبيعي • برج حديث"

},

{

cat:"شقق",

title:

"شقة عبير سيتي",

price:

"4.5 مليون",

tags:[

"170م",

"فاخر"

],

details:

"تشطيب ألترا • عدادات كاملة"

},

{

cat:"فيلل",

title:

"فيلا مراكش",

price:

"10.5 مليون",

tags:[

"161م",

"حمام سباحة"

],

details:

"فيو مفتوح • بدروم + أرضي + أول"

},

{

cat:"محلات",

title:

"محل شلبي",

price:

"850 ألف",

tags:[

"28م"

],

details:

"عداد تجاري • تشطيب لوكس"

}

]

const list=

document
.getElementById(
"list"
)

let current=

"شقق"

function draw(){

list.innerHTML=""

properties

.filter(

x=>

x.cat===current

)

.forEach(

x=>{

list.innerHTML+=`

<div
class="card">

<div
class="title">

${x.title}

</div>

<div
class="price">

${x.price}

</div>

<div
class="tags">

${x.tags

.map(

t=>

`

<div
class="tag">

${t}

</div>

`

)

.join("")}

</div>

<div
class="details">

${x.details}

<a
class="wa"

href=

"https://wa.me/201555086599?text=${encodeURIComponent(x.title)}"

>

استفسر الآن

</a>

</div>

</div>

`

}

)

}

draw()

document

.querySelectorAll(

".tab"

)

.forEach(

b=>{

b.onclick=

()=>{

document

.querySelectorAll(

".tab"

)

.forEach(

x=>

x.classList

.remove(

"active"

)

)

b.classList

.add(

"active"

)

current=

b.innerText

draw()

}

}

)

document

.getElementById(

"search"

)

.addEventListener(

"input",

e=>{

let k=

e.target.value

.toLowerCase()

document

.querySelectorAll(

".card"

)

.forEach(

c=>{

c.style.display=

c.innerText

.toLowerCase()

.includes(

k

)

?

"block"

:

"none"

}

)

}

)

</script>

</body>

</html>
