<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كابيتال هوم | عقارات المنيا</title>
    <meta name="theme-color" content="#0c0c0e">
    <style>
        /* CSS مصلح وبسيط لضمان الترتيب الرأسي */
        body { font-family: 'Cairo', sans-serif; background-color: #0c0c0e; color: #fff; margin: 0; padding: 0; }
        .container { width: 92%; max-width: 600px; margin: 0 auto; padding-top: 1rem; }
        header { text-align: center; padding: 1rem 0; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #141417; color: #fff; margin-bottom: 1rem; }
        nav { display: flex; gap: 8px; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .nav-btn { padding: 10px 15px; border-radius: 8px; background: #141417; border: 1px solid #333; color: #a1a1aa; font-weight: bold; }
        .nav-btn.active-btn { background: #d4af37; color: #0c0c0e; }
        .card { background: #141417; padding: 20px; border-radius: 16px; border: 1px solid #333; margin-bottom: 15px; cursor: pointer; }
        .price-text { color: #38bdf8; font-weight: bold; margin: 10px 0; }
        .details-box { display: none; background: #111113; padding: 20px; border-radius: 16px; border: 1px solid #d4af37; margin-top: -10px; margin-bottom: 15px; }
        .details-box.open-box { display: block; }
        .floating-whatsapp { position: fixed; bottom: 20px; right: 20px; background: #22c55e; padding: 10px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="brand-og-image.jpg" width="100" height="100" alt="Logo">
        <p style="color:#d4d4d8; font-size: 0.9rem;">نساعدك في اختيار العقار المناسب</p>
    </header>

    <input type="text" id="propertySearch" class="search-box" placeholder="🔍 ابحث عن عقار...">

    <nav>
        <button id="btnCat-شقة" class="nav-btn active-btn" onclick="setCat('شقة')">🏢 الشقق</button>
        <button id="btnCat-فيلا" class="nav-btn" onclick="setCat('فيلا')">🏡 الفيلل</button>
        <button id="btnCat-محل" class="nav-btn" onclick="setCat('محل')">🏪 المحلات</button>
    </nav>

    <div id="noResults" style="display:none; text-align:center; color:#71717a;">لا توجد نتائج.</div>
    <div id="propertiesWrapper"></div>
</div>

<a href="https://wa.me/201555086599" class="floating-whatsapp">
    <svg width="25" height="25" fill="white" viewBox="0 0 24 24"><path d="M17.47 14.38c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.16-.17.2-.35.22-.64.08-.3-.15-1.26-.46-2.39-1.48-.88-.79-1.48-1.76-1.65-2.06-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.03-.52-.08-.15-.67-1.61-.92-2.21-.24-.58-.49-.5-.67-.51-.17-.01-.37-.01-.57-.01-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48 0 1.46 1.07 2.88 1.21 3.07.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.69.63.71.23 1.36.2 1.87.12.57-.09 1.76-.72 2.01-1.41.25-.69.25-1.29.17-1.41-.07-.12-.27-.2-.57-.35z"/></svg>
</a>

<script>
const data = [
    { id: "a1", category: "شقة", title: "شقة دريم ڤالي الفاخرة", priceText: "أوفر 150 ألف + أقساط", meta: ["135م", "تقسيط"] },
    { id: "a2", category: "شقة", title: "شقة عمارة كمين الصفا", priceText: "750 ألف جنيه", meta: ["90م"] }
];
let cat = "شقة";

function setCat(c) {
    cat = c;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active-btn', b.textContent.includes(c)));
    render();
}

function render() {
    const wrap = document.getElementById('propertiesWrapper');
    wrap.innerHTML = '';
    const filtered = data.filter(i => i.category === cat);
    filtered.forEach(p => {
        const div = document.createElement('div');
        div.innerHTML = `<div class="card" onclick="document.getElementById('box-${p.id}').classList.toggle('open-box')">
            <div style="font-weight:bold">${p.title}</div>
            <div class="price-text">${p.priceText}</div>
        </div>
        <div class="details-box" id="box-${p.id}">تفاصيل ${p.title}</div>`;
        wrap.appendChild(div);
    });
}
render();
</script>
</body>
</html>
